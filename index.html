<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Klonu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #36393f; color: #dcddde; overflow: hidden; }
        
        /* Sol Menü */
        .sidebar { width: 250px; background-color: #2f3136; padding: 20px 10px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { font-size: 14px; color: #8e9297; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; }
        #channel-list, #dm-list { overflow-y: auto; margin-bottom: 10px;}
        .channel { padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; color: #8e9297; font-weight: 500; display: flex; justify-content: space-between;}
        .channel:hover, .channel.active { background-color: #393c43; color: #fff; }
        .locked-icon { color: #ed4245; font-size: 12px; }
        
        #admin-panel-btn, #profile-btn { margin-top: 5px; padding: 12px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;}
        #admin-panel-btn { display: none; background-color: #ed4245; } #profile-btn { background-color: #5865F2; }
        
        /* Ana Sohbet Alanı */
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid #202225;}
        .messages { flex: 1; padding: 20px; overflow-y: auto; }
        
        .message { display: flex; flex-direction: row; margin-bottom: 20px; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #5865F2; margin-right: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-weight: bold; color: white; cursor: pointer; transition: 0.2s; flex-shrink:0;}
        .message-avatar:hover { opacity: 0.8; transform: scale(1.05); }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: baseline; margin-bottom: 5px; cursor: pointer;}
        .message-header .username { font-weight: bold; color: #fff; font-size: 16px; margin-right: 8px; }
        .message-header .username:hover { text-decoration: underline; }
        .message .text { color: #dcddde; line-height: 1.5; margin-bottom: 5px; }
        .media-preview { max-width: 300px; max-height: 300px; border-radius: 8px; margin-top: 5px; border: 1px solid #202225;}
        .audio-preview { height: 40px; margin-top: 5px; outline: none; }
        
        .input-area { padding: 0 20px 20px 20px; background-color: #36393f; position: relative;}
        .input-box { display: flex; background-color: #40444b; border-radius: 8px; padding: 10px 15px; align-items: center;}
        .input-box input { flex: 1; background: transparent; border: none; color: #dcddde; outline: none; font-size:15px;}
        .input-box button { background-color: #5865F2; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* Medya Menüsü */
        .attach-btn { background-color: #4f545c !important; border-radius: 50% !important; padding: 8px 13px !important; margin-right: 15px; font-size: 18px; cursor:pointer; color:white; border:none;}
        .attach-menu { display: none; position: absolute; bottom: 70px; left: 20px; background: #2f3136; border-radius: 8px; padding: 10px; width: 200px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 50;}
        .attach-menu button { display: block; width: 100%; background: none; border: none; color: white; text-align: left; padding: 12px; cursor: pointer; border-radius: 4px; margin-bottom: 2px;}
        .attach-menu button:hover { background: #393c43; }

        /* Sağ Aktiflik Çubuğu */
        .right-sidebar { width: 200px; background-color: #2f3136; padding: 20px 10px; display: flex; flex-direction: column; }
        .right-sidebar h2 { font-size: 14px; color: #8e9297; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; }
        .online-user { display: flex; align-items: center; padding: 8px; color: #8e9297; font-weight: 500; }
        .online-dot { width: 10px; height: 10px; background-color: #43b581; border-radius: 50%; margin-right: 10px; }

        /* Modallar */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background-color: #36393f; padding: 30px; border-radius: 8px; width: 400px; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: none; background: #202225; color: white; outline: none; }
        .modal-box button { padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; width: 100%;}
        .btn-green { background-color: #43b581; } .btn-red { background-color: #ed4245; } .btn-blue { background-color: #5865F2; } .btn-gray { background-color: #72767d; }
        
        .profile-pic-preview { width: 100px; height: 100px; border-radius: 50%; background-color: #202225; margin: 0 auto 15px auto; display: flex; justify-content: center; align-items: center; overflow: hidden; font-size: 40px; color: white;}
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="modal-box" style="text-align: center; width: 350px;">
            <h2 style="color: white; margin-bottom: 20px;">Sisteme Giriş</h2>
            <input type="text" id="login-username" placeholder="Kullanıcı Adı">
            <input type="password" id="login-password" placeholder="Şifre">
            <div style="text-align: left; margin-bottom: 20px;">
                <input type="checkbox" id="remember-me" style="margin-right: 5px;">
                <label for="remember-me" style="color: #8e9297; font-size: 14px;">Beni Hatırla</label>
            </div>
            <button id="login-btn" class="btn-blue">Giriş Yap</button>
            <p id="login-error" style="color: #ed4245; display: none; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="profile-modal" class="overlay" style="display: none;">
        <div class="modal-box" style="text-align: center;">
            <h2 style="color: white;">Kullanıcı Profilim</h2>
            <p style="color: #8e9297; margin-bottom: 20px; font-size: 14px;">Diğer kullanıcılara nasıl görüneceğini ayarla.</p>
            
            <div class="profile-pic-preview" id="edit-pic-preview">?</div>
            <input type="file" id="edit-pic-upload" accept="image/*" style="display: none;">
            <button class="btn-blue" onclick="document.getElementById('edit-pic-upload').click()">📷 Fotoğraf Yükle</button>
            
            <div style="text-align: left; margin-top: 15px;">
                <label style="color: #8e9297; font-size: 12px; font-weight: bold;">GÖRÜNEN ADINIZ</label>
                <input type="text" id="edit-display-name" placeholder="Örn: KralOyuncu">
            </div>

            <button class="btn-green" id="save-profile-btn" style="margin-top: 10px;">Değişiklikleri Kaydet</button>
            <button class="btn-gray" onclick="document.getElementById('profile-modal').style.display='none'">İptal</button>
        </div>
    </div>

    <div id="admin-modal" class="overlay" style="display: none;">
        <div class="modal-box">
            <h2 style="color: white; text-align: center; margin-bottom:15px;">🛡️ Sistem Yönetimi</h2>
            
            <button class="btn-blue" onclick="fetchReports()">📩 Gelen Şikayetleri Oku</button>
            <div id="admin-reports-area" style="background:#202225; padding:10px; border-radius:4px; margin-bottom:15px; display:none; max-height:150px; overflow-y:auto; color:white; font-size:13px;"></div>
            
            <h3 style="color: white; border-top:1px solid #4f545c; padding-top:10px; margin-bottom:10px;">👤 Kullanıcı İşlemleri</h3>
            <input type="text" id="admin-user-target" placeholder="Hedef Kullanıcı Adı">
            <input type="text" id="admin-user-val" placeholder="Şifre (Sadece Hesap Açarken)">
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <button class="btn-green" onclick="admUser('create')">Hesap Aç</button>
                <button class="btn-red" onclick="admUser('ban')">Banla</button>
                <button class="btn-red" onclick="admUser('delete')">Sil</button>
            </div>

            <h3 style="color: white; border-top:1px solid #4f545c; padding-top:10px; margin-bottom:10px;">📁 Kanal İşlemleri</h3>
            <input type="text" id="admin-chan-target" placeholder="Kanal Adı (Örn: sohbet)">
            <input type="text" id="admin-chan-val" placeholder="Yeni Ad veya Şifre">
            <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                <button class="btn-green" onclick="admChan('create')">Kanal Aç</button>
                <button class="btn-blue" onclick="admChan('rename')">Ad Değiş</button>
            </div>
            <div style="display: flex; gap: 5px; margin-bottom:15px;">
                <button class="btn-red" onclick="admChan('lock')">Şifrele</button>
                <button class="btn-red" onclick="admChan('delete')">Sil</button>
            </div>
            
            <button class="btn-gray" onclick="document.getElementById('admin-modal').style.display='none'">Kapat</button>
        </div>
    </div>

    <div id="user-action-modal" class="overlay" style="display: none;">
        <div class="modal-box" style="text-align: center; width: 300px;">
            <div id="action-avatar" style="width:80px; height:80px; border-radius:50%; background:#5865F2; margin:0 auto 15px auto; display:flex; align-items:center; justify-content:center; font-size:30px; color:white; overflow:hidden;"></div>
            <h2 id="action-username" style="color: white; margin-bottom: 20px;">Kullanıcı</h2>
            <button class="btn-blue" onclick="startDM()">💬 Özel Mesaj (DM)</button>
            <button class="btn-red" onclick="openReport()">⚠️ Şikayet Et</button>
            <button class="btn-gray" onclick="document.getElementById('user-action-modal').style.display='none'">İptal</button>
        </div>
    </div>

    <div id="report-modal" class="overlay" style="display: none;">
        <div class="modal-box">
            <h3 style="color: white; margin-bottom:15px;">Şikayet Et: <span id="report-target-name"></span></h3>
            <textarea id="report-reason" rows="4" placeholder="Neden şikayet ediyorsunuz?"></textarea>
            <button class="btn-red" onclick="sendReport()">Gizlice İlet</button>
            <button class="btn-gray" onclick="document.getElementById('report-modal').style.display='none'">Vazgeç</button>
        </div>
    </div>

    <div id="password-modal" class="overlay" style="display: none;">
        <div class="modal-box" style="width: 300px; text-align: center;">
            <h3 style="color:white; margin-bottom:15px;">Kanal Şifreli 🔒</h3>
            <input type="password" id="channel-pwd-input" placeholder="Kanal Şifresi">
            <button class="btn-blue" id="submit-chan-pwd">Giriş Yap</button>
            <button class="btn-gray" onclick="document.getElementById('password-modal').style.display='none'">İptal</button>
        </div>
    </div>

    <div id="camera-modal" class="overlay" style="display: none;">
        <div class="modal-box" style="width: auto; max-width: 90%;">
            <video id="camera-video" autoplay style="width: 100%; border-radius: 8px; transform: scaleX(-1);"></video>
            <button id="capture-btn" class="btn-green" style="margin-top: 15px;">📸 Fotoğrafı Gönder</button>
            <button id="close-camera-btn" class="btn-red">İptal</button>
            <canvas id="camera-canvas" style="display: none;"></canvas>
        </div>
    </div>

    <div class="sidebar">
        <h2>Metin Kanalları</h2>
        <div id="channel-list"></div>
        <h2 style="margin-top: 15px;">Özel Mesajlar (DM)</h2>
        <div id="dm-list"></div>
        <div style="margin-top: auto;">
            <button id="profile-btn">⚙️ Profilim</button>
            <button id="admin-panel-btn">🛡️ Admin Paneli</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="messages" id="chat-messages"></div>
        <div class="input-area">
            <div class="attach-menu" id="attach-menu">
                <button id="btn-gallery">🖼️ Galeriden Seç</button>
                <button id="btn-camera">📷 Kamera Aç</button>
                <button id="btn-audio-file">🎵 Ses Dosyası Seç</button>
                <button id="btn-mic">🎤 Mikrofon Kaydı</button>
            </div>
            <input type="file" id="file-gallery" accept="image/*" style="display: none;">
            <input type="file" id="file-audio" accept="audio/*" style="display: none;">

            <div class="input-box">
                <button class="attach-btn" id="attach-btn">+</button>
                <input type="text" id="message-input" placeholder="Mesaj gönder...">
                <button id="send-button">Gönder</button>
            </div>
        </div>
    </div>

    <div class="right-sidebar">
        <h2>Çevrimiçi (<span id="online-count">0</span>)</h2>
        <div id="online-list"></div>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");

        let myUsername = "", activeChannel = "", myRole = "user";
        let myDisplayName = "", myProfilePic = ""; 
        let clickedUser = "", pendingChannel = ""; 

        // 1. GİRİŞ
        window.onload = function() {
            if (localStorage.getItem("discord_user") && localStorage.getItem("discord_pass")) {
                document.getElementById('login-username').value = localStorage.getItem("discord_user");
                document.getElementById('login-password').value = localStorage.getItem("discord_pass");
                document.getElementById('remember-me').checked = true;
            }
        };

        document.getElementById('login-btn').addEventListener('click', function() {
            ws.send(JSON.stringify({ type: "login", username: document.getElementById('login-username').value.trim(), password: document.getElementById('login-password').value.trim() }));
        });

        // 2. SUNUCUDAN GELEN VERİLER
        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.type === "login_response") {
                if (data.success) {
                    myUsername = document.getElementById('login-username').value.trim();
                    myRole = data.role;
                    myDisplayName = data.display_name;
                    myProfilePic = data.profile_pic;
                    document.getElementById('login-screen').style.display = 'none';
                    if (document.getElementById('remember-me').checked) {
                        localStorage.setItem("discord_user", myUsername);
                        localStorage.setItem("discord_pass", document.getElementById('login-password').value.trim());
                    }
                    if(myRole === "admin") document.getElementById('admin-panel-btn').style.display = 'block';
                } else {
                    const err = document.getElementById('login-error'); err.innerText = data.error_msg; err.style.display = 'block';
                }
            }
            else if (data.type === "online_list") {
                document.getElementById('online-count').innerText = data.users.length;
                const list = document.getElementById('online-list');
                list.innerHTML = "";
                data.users.forEach(u => list.innerHTML += `<div class="online-user"><div class="online-dot"></div> ${u}</div>`);
            }
            else if (data.type === "channel_list") {
                const list = document.getElementById('channel-list');
                list.innerHTML = "";
                data.channels.forEach((ch, index) => {
                    if(activeChannel === "" && index === 0) activeChannel = ch.name;
                    list.innerHTML += `<div class="channel ${activeChannel===ch.name ? 'active':''}" onclick="selectChannel('${ch.name}', ${ch.is_locked})"># ${ch.name} ${ch.is_locked ? '<span class="locked-icon">🔒</span>' : ''}</div>`;
                });
                if (activeChannel) ws.send(JSON.stringify({ type: "load_history", channel: activeChannel }));
            }
            else if (data.type === "history") {
                activeChannel = data.channel;
                document.getElementById('chat-messages').innerHTML = "";
                document.getElementById('message-input').placeholder = `${activeChannel.startsWith('@') ? 'DM: ' : '#'}${activeChannel} kanalına mesaj...`;
                document.querySelectorAll('.channel').forEach(c => { c.classList.remove('active'); if(c.innerText.includes(activeChannel)) c.classList.add('active'); });
                document.getElementById('password-modal').style.display = 'none';
                data.messages.forEach(msg => addMessageToScreen(msg.username, msg.time, msg.text, msg.media_data, msg.media_type, msg.display_name, msg.profile_pic));
            } 
            else if (data.type === "message") {
                if (data.channel === activeChannel || (activeChannel.startsWith('@') && data.channel === `@${myUsername}` && data.username === activeChannel.substring(1))) {
                    addMessageToScreen(data.username, data.time, data.text, data.media_data, data.media_type, data.display_name, data.profile_pic);
                }
            }
            else if (data.type === "profile_updated") {
                myDisplayName = data.display_name; myProfilePic = data.profile_pic;
                alert("Profilin güncellendi!"); document.getElementById('profile-modal').style.display = 'none';
            }
            else if (data.type === "report_list") {
                const area = document.getElementById('admin-reports-area');
                area.innerHTML = data.reports.length === 0 ? "Şikayet yok." : "";
                data.reports.forEach(r => area.innerHTML += `<div style="border-bottom:1px solid #4f545c; padding:5px 0;"><b>Kimden:</b> ${r.reporter} <br><b>Kimi:</b> <span style="color:#ed4245">${r.reported}</span> <br><b>Neden:</b> ${r.reason} <br><i>${r.time}</i></div>`);
                area.style.display = 'block';
            }
            else if (data.type === "system_msg") alert("SİSTEM: " + data.message);
            else if (data.type === "system_error") alert("HATA: " + data.message);
        };

        // 3. KANAL SEÇİMİ VE ŞİFRE
        function selectChannel(chName, isLocked) {
            if (isLocked && !chName.startsWith('@')) {
                pendingChannel = chName; document.getElementById('channel-pwd-input').value = ""; document.getElementById('password-modal').style.display = 'flex';
            } else {
                ws.send(JSON.stringify({ type: "load_history", channel: chName }));
            }
        }
        document.getElementById('submit-chan-pwd').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: "load_history", channel: pendingChannel, password: document.getElementById('channel-pwd-input').value }));
        });

        // 4. MESAJ RENDER VE PROFİL TIKLAMA (DM/ŞİKAYET)
        function showUserAction(username, picStr) {
            if(username === myUsername) return; 
            clickedUser = username;
            document.getElementById('action-username').innerText = username;
            document.getElementById('action-avatar').innerHTML = picStr ? `<img src="${picStr}" style="width:100%; height:100%; object-fit:cover;">` : username.charAt(0).toUpperCase();
            document.getElementById('user-action-modal').style.display = 'flex';
        }

        function startDM() {
            document.getElementById('user-action-modal').style.display = 'none';
            activeChannel = `@${clickedUser}`; 
            const dmList = document.getElementById('dm-list');
            if(!dmList.innerHTML.includes(`@${clickedUser}`)) dmList.innerHTML += `<div class="channel active" onclick="selectChannel('@${clickedUser}', false)">💬 ${clickedUser}</div>`;
            selectChannel(`@${clickedUser}`, false);
        }

        function openReport() {
            document.getElementById('user-action-modal').style.display = 'none';
            document.getElementById('report-target-name').innerText = clickedUser;
            document.getElementById('report-modal').style.display = 'flex';
        }
        function sendReport() {
            const reason = document.getElementById('report-reason').value.trim();
            if(!reason) return alert("Neden yazın.");
            ws.send(JSON.stringify({ type: "report_user", reporter: myUsername, reported: clickedUser, reason: reason }));
            document.getElementById('report-modal').style.display = 'none'; document.getElementById('report-reason').value = "";
        }

        function addMessageToScreen(username, time, text, media_data, media_type, dName, pPic) {
            let mediaHTML = "";
            if (media_data) {
                if (media_type === "image") mediaHTML = `<img src="${media_data}" class="media-preview">`;
                else if (media_type === "audio") mediaHTML = `<audio controls src="${media_data}" class="audio-preview"></audio>`;
            }
            const finalName = dName || username;
            const avatarHTML = pPic ? `<img src="${pPic}">` : finalName.charAt(0).toUpperCase();
            
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar" onclick="showUserAction('${username}', '${pPic||''}')">${avatarHTML}</div>
                <div class="message-content">
                    <div class="message-header" onclick="showUserAction('${username}', '${pPic||''}')">
                        <span class="username">${finalName}</span><span class="time">Bugün ${time}</span>
                    </div>
                    ${text ? `<div class="text">${text}</div>` : ''}
                    ${mediaHTML}
                </div>
            `;
            document.getElementById('chat-messages').appendChild(div);
            div.scrollIntoView();
        }

        function sendPayload(text, mediaData = null, mediaType = null) {
            ws.send(JSON.stringify({ type: "message", username: myUsername, text: text, channel: activeChannel, media_data: mediaData, media_type: mediaType, display_name: myDisplayName, profile_pic: myProfilePic }));
        }

        document.getElementById('send-button').addEventListener('click', () => {
            const text = document.getElementById('message-input').value.trim();
            if (text !== '') { sendPayload(text); document.getElementById('message-input').value = ''; }
        });
        document.getElementById('message-input').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('send-button').click(); });

        // 5. PROFİL DÜZENLEME MANTIĞI
        let tempPicBase64 = "";
        document.getElementById('profile-btn').addEventListener('click', () => {
            document.getElementById('edit-display-name').value = myDisplayName;
            const preview = document.getElementById('edit-pic-preview');
            if(myProfilePic) preview.innerHTML = `<img src="${myProfilePic}">`;
            else preview.innerHTML = (myDisplayName || myUsername).charAt(0).toUpperCase();
            tempPicBase64 = myProfilePic;
            document.getElementById('profile-modal').style.display = 'flex';
        });
        document.getElementById('edit-pic-upload').addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = e => { tempPicBase64 = e.target.result; document.getElementById('edit-pic-preview').innerHTML = `<img src="${tempPicBase64}">`; };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById('save-profile-btn').addEventListener('click', () => {
            ws.send(JSON.stringify({ type: "update_profile", username: myUsername, display_name: document.getElementById('edit-display-name').value.trim(), profile_pic: tempPicBase64 }));
        });

        // 6. ADMİN MANTIĞI (Eksiksiz!)
        document.getElementById('admin-panel-btn').addEventListener('click', () => document.getElementById('admin-modal').style.display = 'flex');
        function fetchReports() { ws.send(JSON.stringify({ type: "get_reports" })); }
        function admUser(act) { ws.send(JSON.stringify({ type: "admin_user_action", action: act, target: document.getElementById('admin-user-target').value.trim(), value: document.getElementById('admin-user-val').value.trim() })); }
        function admChan(act) { ws.send(JSON.stringify({ type: "admin_channel_action", action: act, target: document.getElementById('admin-chan-target').value.trim(), value: document.getElementById('admin-chan-val').value.trim() })); }

        // 7. MEDYA YÜKLEME (Galeri, Ses, Kamera)
        const attachBtn = document.getElementById('attach-btn');
        const attachMenu = document.getElementById('attach-menu');
        attachBtn.addEventListener('click', () => { attachMenu.style.display = attachMenu.style.display === 'block' ? 'none' : 'block'; });
        
        const processFile = (inputElement, type) => {
            inputElement.click();
            inputElement.onchange = function() {
                const file = this.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = e => sendPayload("", e.target.result, type);
                    reader.readAsDataURL(file);
                }
                this.value = ''; attachMenu.style.display = 'none';
            };
        };
        document.getElementById('btn-gallery').addEventListener('click', () => processFile(document.getElementById('file-gallery'), "image"));
        document.getElementById('btn-audio-file').addEventListener('click', () => processFile(document.getElementById('file-audio'), "audio"));
        
        let mediaRecorder, audioChunks = [];
        document.getElementById('btn-mic').addEventListener('click', async function() {
            if (this.innerText.includes("Durdur")) { mediaRecorder.stop(); this.innerText = "🎤 Mikrofon Kaydı"; this.style.color = "white"; return; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream); audioChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const reader = new FileReader(); reader.onloadend = () => sendPayload("", reader.result, "audio");
                    reader.readAsDataURL(new Blob(audioChunks, { type: 'audio/webm' }));
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start(); this.innerText = "🔴 Kaydediliyor... (Durdur)"; this.style.color = "#ed4245";
            } catch (err) { alert("Mikrofon izni yok!"); }
            attachMenu.style.display = 'none';
        });

        let videoStream = null;
        document.getElementById('btn-camera').addEventListener('click', async () => {
            attachMenu.style.display = 'none';
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                document.getElementById('camera-video').srcObject = videoStream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch (err) { alert("Kamera izni yok!"); }
        });
        const closeCamera = () => { document.getElementById('camera-modal').style.display = 'none'; if (videoStream) videoStream.getTracks().forEach(track => track.stop()); };
        document.getElementById('close-camera-btn').addEventListener('click', closeCamera);
        document.getElementById('capture-btn').addEventListener('click', () => {
            const video = document.getElementById('camera-video'); const canvas = document.getElementById('camera-canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d'); ctx.translate(canvas.width, 0); ctx.scale(-1, 1); ctx.drawImage(video, 0, 0);
            sendPayload("", canvas.toDataURL('image/jpeg', 0.8), "image"); closeCamera();
        });
    </script>
</body>
</html>
