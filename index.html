<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Klonu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #36393f; color: #dcddde; overflow: hidden; }
        
        .sidebar { width: 250px; background-color: #2f3136; padding: 20px 10px; display: flex; flex-direction: column; z-index: 10; }
        .sidebar h2 { font-size: 14px; color: #8e9297; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; }
        #channel-list, #dm-list { overflow-y: auto; margin-bottom: 10px;}
        .channel { padding: 10px; margin-bottom: 5px; border-radius: 5px; cursor: pointer; color: #8e9297; font-weight: 500; display: flex; justify-content: space-between;}
        .channel:hover, .channel.active { background-color: #393c43; color: #fff; }
        
        #admin-panel-btn, #profile-btn { margin-top: 5px; padding: 12px; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #admin-panel-btn { display: none; background-color: #ed4245; } #profile-btn { background-color: #5865F2; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid #202225;}
        .messages { flex: 1; padding: 20px; overflow-y: auto; }
        
        .message { display: flex; flex-direction: row; margin-bottom: 20px; }
        .message-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #5865F2; margin-right: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; font-weight: bold; color: white; cursor: pointer; transition: 0.2s;}
        .message-avatar:hover { opacity: 0.8; transform: scale(1.05); }
        .message-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .message-content { flex: 1; }
        .message-header { display: flex; align-items: baseline; margin-bottom: 5px; cursor: pointer;}
        .message-header .username { font-weight: bold; color: #fff; font-size: 16px; margin-right: 8px; }
        .message-header .username:hover { text-decoration: underline; }
        .message .text { color: #dcddde; line-height: 1.5; margin-bottom: 5px; }
        .media-preview { max-width: 300px; max-height: 300px; border-radius: 8px; margin-top: 5px; }
        
        .input-area { padding: 0 20px 20px 20px; background-color: #36393f; }
        .input-box { display: flex; background-color: #40444b; border-radius: 8px; padding: 10px 15px; }
        .input-box input { flex: 1; background: transparent; border: none; color: #dcddde; outline: none; }
        .input-box button { background-color: #5865F2; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* YENİ: Sağ Aktiflik Çubuğu */
        .right-sidebar { width: 200px; background-color: #2f3136; padding: 20px 10px; display: flex; flex-direction: column; }
        .right-sidebar h2 { font-size: 14px; color: #8e9297; margin-bottom: 15px; text-transform: uppercase; padding-left: 10px; }
        .online-user { display: flex; align-items: center; padding: 8px; color: #8e9297; font-weight: 500; }
        .online-dot { width: 10px; height: 10px; background-color: #43b581; border-radius: 50%; margin-right: 10px; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background-color: #36393f; padding: 30px; border-radius: 8px; width: 400px; max-height: 90vh; overflow-y: auto;}
        .modal-box input, .modal-box textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 4px; border: none; background: #202225; color: white; outline: none; }
        .modal-box button { padding: 10px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; width: 100%;}
        .btn-green { background-color: #43b581; } .btn-red { background-color: #ed4245; } .btn-blue { background-color: #5865F2; } .btn-gray { background-color: #72767d; }
    </style>
</head>
<body>

    <div id="login-screen" class="overlay">
        <div class="modal-box" style="text-align: center; width: 350px;">
            <h2 style="color: white; margin-bottom: 20px;">Sisteme Giriş</h2>
            <input type="text" id="login-username" placeholder="Kullanıcı Adı">
            <input type="password" id="login-password" placeholder="Şifre">
            <button id="login-btn" class="btn-blue">Giriş Yap</button>
            <p id="login-error" style="color: #ed4245; display: none; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="user-action-modal" class="overlay" style="display: none;">
        <div class="modal-box" style="text-align: center; width: 300px;">
            <div id="action-avatar" style="width:80px; height:80px; border-radius:50%; background:#5865F2; margin:0 auto 15px auto; display:flex; align-items:center; justify-content:center; font-size:30px; color:white; overflow:hidden;"></div>
            <h2 id="action-username" style="color: white; margin-bottom: 20px;">Kullanıcı</h2>
            <button class="btn-blue" onclick="startDM()">💬 Özel Mesaj (DM) Gönder</button>
            <button class="btn-red" onclick="openReport()">⚠️ Bu Kullanıcıyı Şikayet Et</button>
            <button class="btn-gray" onclick="document.getElementById('user-action-modal').style.display='none'">İptal</button>
        </div>
    </div>

    <div id="report-modal" class="overlay" style="display: none;">
        <div class="modal-box">
            <h3 style="color: white; margin-bottom:15px;">Şikayet Et: <span id="report-target-name"></span></h3>
            <textarea id="report-reason" rows="4" placeholder="Neden şikayet ediyorsunuz? (Sadece adminler görebilir)"></textarea>
            <button class="btn-red" onclick="sendReport()">Gizlice İlet</button>
            <button class="btn-gray" onclick="document.getElementById('report-modal').style.display='none'">Vazgeç</button>
        </div>
    </div>

    <div id="admin-modal" class="overlay" style="display: none;">
        <div class="modal-box">
            <h2 style="color: white; text-align: center;">🛡️ Sistem Yönetimi</h2>
            <button class="btn-blue" onclick="fetchReports()">📩 Gelen Şikayetleri Oku</button>
            <div id="admin-reports-area" style="background:#202225; padding:10px; border-radius:4px; margin-bottom:15px; display:none; max-height:150px; overflow-y:auto; color:white; font-size:13px;"></div>
            
            <h3 style="color: white; margin-top:15px; border-top:1px solid #4f545c; padding-top:10px;">Kullanıcı İşlemleri</h3>
            <input type="text" id="admin-user-target" placeholder="Hedef Kullanıcı Adı">
            <button class="btn-red" onclick="admUser('ban')">Banla</button>
            <button class="btn-gray" onclick="document.getElementById('admin-modal').style.display='none'">Kapat</button>
        </div>
    </div>

    <div class="sidebar">
        <h2>Metin Kanalları</h2>
        <div id="channel-list"></div>
        <h2 style="margin-top: 15px;">Özel Mesajlar (DM)</h2>
        <div id="dm-list"></div>
        <div style="margin-top: auto;">
            <button id="profile-btn">⚙️ Profilim</button>
            <button id="admin-panel-btn">🛡️ Admin Paneli</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="messages" id="chat-messages"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="message-input" placeholder="Mesaj gönder...">
                <button id="send-button">Gönder</button>
            </div>
        </div>
    </div>

    <div class="right-sidebar">
        <h2>Çevrimiçi (<span id="online-count">0</span>)</h2>
        <div id="online-list"></div>
    </div>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss://" : "ws://";
        const ws = new WebSocket(protocol + window.location.host + "/ws");

        let myUsername = "", activeChannel = "", myRole = "user";
        let clickedUser = "", clickedAvatar = ""; // Profil tıklamaları için

        document.getElementById('login-btn').addEventListener('click', function() {
            ws.send(JSON.stringify({ type: "login", username: document.getElementById('login-username').value.trim(), password: document.getElementById('login-password').value.trim() }));
        });

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            if (data.type === "login_response") {
                if (data.success) {
                    myUsername = document.getElementById('login-username').value.trim();
                    myRole = data.role;
                    document.getElementById('login-screen').style.display = 'none';
                    if(myRole === "admin") document.getElementById('admin-panel-btn').style.display = 'block';
                } else {
                    document.getElementById('login-error').innerText = data.error_msg;
                    document.getElementById('login-error').style.display = 'block';
                }
            }
            else if (data.type === "online_list") {
                // Aktiflik listesini sağa diz
                document.getElementById('online-count').innerText = data.users.length;
                const list = document.getElementById('online-list');
                list.innerHTML = "";
                data.users.forEach(u => {
                    list.innerHTML += `<div class="online-user"><div class="online-dot"></div> ${u}</div>`;
                });
            }
            else if (data.type === "channel_list") {
                const list = document.getElementById('channel-list');
                list.innerHTML = "";
                data.channels.forEach((ch, index) => {
                    if(activeChannel === "" && index === 0) activeChannel = ch.name;
                    list.innerHTML += `<div class="channel ${activeChannel===ch.name ? 'active':''}" onclick="selectChannel('${ch.name}', false)"># ${ch.name}</div>`;
                });
                if (activeChannel) ws.send(JSON.stringify({ type: "load_history", channel: activeChannel }));
            }
            else if (data.type === "history") {
                activeChannel = data.channel;
                document.getElementById('chat-messages').innerHTML = "";
                document.getElementById('message-input').placeholder = `${activeChannel.startsWith('@') ? 'DM: ' : '#'}${activeChannel} kanalına mesaj...`;
                data.messages.forEach(msg => addMessageToScreen(msg.username, msg.time, msg.text, msg.display_name, msg.profile_pic));
            } 
            else if (data.type === "message") {
                // Sadece benim bulunduğum kanala veya bana gelen DM ise göster
                if (data.channel === activeChannel || (activeChannel.startsWith('@') && data.channel === `@${myUsername}` && data.username === activeChannel.substring(1))) {
                    addMessageToScreen(data.username, data.time, data.text, data.display_name, data.profile_pic);
                }
            }
            else if (data.type === "report_list") {
                const area = document.getElementById('admin-reports-area');
                area.innerHTML = data.reports.length === 0 ? "Henüz şikayet yok." : "";
                data.reports.forEach(r => {
                    area.innerHTML += `<div style="border-bottom:1px solid #4f545c; padding:5px 0;"><b>Kimden:</b> ${r.reporter} <br><b>Kimi:</b> <span style="color:#ed4245">${r.reported}</span> <br><b>Neden:</b> ${r.reason} <br><i>${r.time}</i></div>`;
                });
                area.style.display = 'block';
            }
            else if (data.type === "system_msg") alert("SİSTEM: " + data.message);
        };

        function selectChannel(chName, isLocked) {
            document.querySelectorAll('.channel').forEach(c => c.classList.remove('active'));
            ws.send(JSON.stringify({ type: "load_history", channel: chName }));
        }

        // BAŞKASININ PROFİLİNE TIKLAMA MANTIĞI
        function showUserAction(username, picStr) {
            if(username === myUsername) return; // Kendimize tıklamayalım
            clickedUser = username;
            document.getElementById('action-username').innerText = username;
            document.getElementById('action-avatar').innerHTML = picStr ? `<img src="${picStr}" style="width:100%; height:100%; object-fit:cover;">` : username.charAt(0).toUpperCase();
            document.getElementById('user-action-modal').style.display = 'flex';
        }

        // DM BAŞLATMA
        function startDM() {
            document.getElementById('user-action-modal').style.display = 'none';
            activeChannel = `@${clickedUser}`; // DM kanal formülü: @KullanıcıAdı
            
            // Sol menüye DM kısayolunu ekle
            const dmList = document.getElementById('dm-list');
            if(!dmList.innerHTML.includes(`@${clickedUser}`)) {
                dmList.innerHTML += `<div class="channel active" onclick="selectChannel('@${clickedUser}', false)">💬 ${clickedUser}</div>`;
            }
            selectChannel(`@${clickedUser}`, false);
        }

        // ŞİKAYET ETME
        function openReport() {
            document.getElementById('user-action-modal').style.display = 'none';
            document.getElementById('report-target-name').innerText = clickedUser;
            document.getElementById('report-modal').style.display = 'flex';
        }
        function sendReport() {
            const reason = document.getElementById('report-reason').value.trim();
            if(!reason) return alert("Lütfen bir neden yazın.");
            ws.send(JSON.stringify({ type: "report_user", reporter: myUsername, reported: clickedUser, reason: reason }));
            document.getElementById('report-modal').style.display = 'none';
            document.getElementById('report-reason').value = "";
        }

        function fetchReports() { ws.send(JSON.stringify({ type: "get_reports" })); }

        // Mesaj Render (Tıklanabilir İsimlerle)
        function addMessageToScreen(username, time, text, dName, pPic) {
            const finalName = dName || username;
            const avatarHTML = pPic ? `<img src="${pPic}">` : finalName.charAt(0).toUpperCase();
            // Resim veya isme tıklandığında showUserAction çalışır!
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `
                <div class="message-avatar" onclick="showUserAction('${username}', '${pPic||''}')">${avatarHTML}</div>
                <div class="message-content">
                    <div class="message-header" onclick="showUserAction('${username}', '${pPic||''}')">
                        <span class="username">${finalName}</span>
                        <span class="time">Bugün ${time}</span>
                    </div>
                    <div class="text">${text}</div>
                </div>
            `;
            document.getElementById('chat-messages').appendChild(div);
            div.scrollIntoView();
        }

        document.getElementById('send-button').addEventListener('click', () => {
            const text = document.getElementById('message-input').value.trim();
            if (text !== '') { 
                ws.send(JSON.stringify({ type: "message", username: myUsername, text: text, channel: activeChannel })); 
                document.getElementById('message-input').value = ''; 
            }
        });
        
        document.getElementById('admin-panel-btn').addEventListener('click', () => document.getElementById('admin-modal').style.display = 'flex');
        function admUser(act) { ws.send(JSON.stringify({ type: "admin_user_action", action: act, target: document.getElementById('admin-user-target').value.trim() })); }
    </script>
</body>
</html>
